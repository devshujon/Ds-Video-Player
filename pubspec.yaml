name: ds_video_player
description: "DS Video Player - a fast, modern, premium Android media player by Dev Shujon."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  get_it: ^8.0.0

  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5

  media_kit: ^1.2.0
  media_kit_video: ^1.3.0
  media_kit_libs_video: ^1.0.6

  just_audio: ^0.9.40
  audio_service: ^0.18.18
  audio_session: ^0.1.25

  photo_manager: ^3.6.0
  photo_view: ^0.15.0

  permission_handler: ^11.3.1
  screen_brightness: ^2.1.8
  flutter_volume_controller: ^1.3.2
  wakelock_plus: ^1.2.10
  file_picker: ^8.1.7

  flutter_secure_storage: ^9.2.4
  local_auth: ^3.0.1
  crypto: ^3.0.6
  cryptography: ^2.7.0

  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  google_fonts: ^6.2.1
  equatable: ^2.0.7
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
